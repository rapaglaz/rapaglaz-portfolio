name: Pull Request Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Run Lint
        uses: ./.github/actions/quality-check
        with:
          mode: lint
          github-token: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Run Tests
        uses: ./.github/actions/quality-check
        with:
          mode: test
          run-tests: ${{ !startsWith(github.head_ref, 'renovate/') }}
          run-i18n-check: ${{ !startsWith(github.head_ref, 'renovate/') }}
          coverage-artifact-name: coverage-reports
          coverage-retention-days: '3'
          sonar-token: ${{ secrets.SONAR_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          sonar-extra-args: >
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
            -Dsonar.pullrequest.branch=${{ github.head_ref }}
            -Dsonar.pullrequest.base=${{ github.base_ref }}
            -Dsonar.newCode.referenceBranch=main

  workflow-lint:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2.1.2

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Build application
        uses: ./.github/actions/build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-artifact-pr
          path: dist/rapaglaz-portfolio/browser
          retention-days: 1

  e2e-tests:
    needs: [build]
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    permissions:
      contents: read
      statuses: write
    uses: ./.github/workflows/e2e.yaml
    with:
      checkout-ref: ${{ github.event.pull_request.head.sha }}
      build-artifact-name: build-artifact-pr
      report-artifact-name: playwright-report-pr
      report-retention-days: 3

  lighthouse:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    continue-on-error: true
    timeout-minutes: 8
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: build-artifact-pr
          path: dist/rapaglaz-portfolio/browser

      - name: Setup environment
        uses: ./.github/actions/workspace-setup

      - name: Run Lighthouse report
        uses: ./.github/actions/lighthouse/report
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # TODO: add Cloudflare Pages preview deploy once CF project is configured

  quality-check:
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    if: always()
    permissions: {}
    steps:
      - name: Check all required jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" || \
                "${{ needs.test.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
