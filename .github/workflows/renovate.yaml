name: Renovate

on:
  schedule:
    - cron: '0 6 * * 1' # Monday 6:00 UTC
    - cron: '0 6 * * 5' # Friday 6:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cache Renovate Docker image
        id: cache-renovate-image
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/renovate-image.tar
          key: renovate-docker-${{ hashFiles('.github/workflows/renovate.yaml') }}

      - name: Load Renovate image from cache
        if: steps.cache-renovate-image.outputs.cache-hit == 'true'
        run: docker load -i /tmp/renovate-image.tar

      - name: Cache Renovate package metadata
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/renovate-cache
          key: renovate-cache-${{ github.run_id }}
          restore-keys: renovate-cache-

      - uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_GIT_AUTHOR: 'renovate[bot] <renovate[bot]@users.noreply.github.com>'
          RENOVATE_CACHE_DIR: /tmp/renovate-cache

      - name: Save Renovate image to cache
        if: steps.cache-renovate-image.outputs.cache-hit != 'true'
        run: docker save ghcr.io/renovatebot/renovate -o /tmp/renovate-image.tar
