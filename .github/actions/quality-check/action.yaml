name: Quality Check
description: 'Runs format, lint, i18n, tests, and SonarCloud scan.'

inputs:
  mode:
    description: 'Which checks to run: lint | test | all'
    required: false
    default: 'all'
  run-tests:
    description: 'Whether to run unit tests with coverage'
    required: false
    default: 'true'
  run-i18n-check:
    description: 'Whether to run i18n validation'
    required: false
    default: 'true'
  coverage-artifact-name:
    description: 'Name for the uploaded coverage artifact'
    required: false
    default: 'coverage-reports'
  coverage-retention-days:
    description: 'Days to retain coverage artifact (0 = default/unlimited)'
    required: false
    default: '0'
  sonar-token:
    description: 'SonarCloud token'
    required: false
    default: ''
  github-token:
    description: 'GitHub token for API access'
    required: true
  sonar-extra-args:
    description: 'Extra -D arguments appended to the SonarCloud scan'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      uses: ./.github/actions/workspace-setup

    - name: Run format check
      if: ${{ inputs.mode == 'lint' || inputs.mode == 'all' }}
      shell: bash
      run: pnpm run format:check

    - name: Run lint
      if: ${{ inputs.mode == 'lint' || inputs.mode == 'all' }}
      shell: bash
      run: pnpm run lint

    - name: Run i18n validation
      if: ${{ (inputs.mode == 'test' || inputs.mode == 'all') && inputs.run-i18n-check == 'true' }}
      shell: bash
      run: pnpm run i18n:check

    - name: Run tests with coverage
      if: ${{ (inputs.mode == 'test' || inputs.mode == 'all') && inputs.run-tests == 'true' }}
      shell: bash
      run: pnpm run test:coverage

    - name: Upload coverage reports
      if: ${{ (inputs.mode == 'test' || inputs.mode == 'all') && inputs.run-tests == 'true' && always() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.coverage-artifact-name }}
        path: coverage/
        retention-days: ${{ inputs.coverage-retention-days != '0' && inputs.coverage-retention-days || '' }}
        if-no-files-found: ignore

    - name: SonarCloud Scan
      if: ${{ (inputs.mode == 'test' || inputs.mode == 'all') && inputs.run-tests == 'true' && inputs.sonar-token != '' && !failure() }}
      uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
      env:
        SONAR_HOST_URL: https://sonarcloud.io
        SONAR_TOKEN: ${{ inputs.sonar-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      with:
        args: ${{ inputs.sonar-extra-args }}
